<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta | Envelope Soul Café</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --morado: #7A1FA1;
            --morado-oscuro: #5a1678;
            --guinda: #670A2B;
            --guinda-claro: #8a0f3a;
            --blanco: #FEFEFF;
            --crema: #f5f0eb;
            --texto-oscuro: #2d1a1a;
            --sombra: rgba(122, 31, 161, 0.2);
        }

        body {
            background: var(--crema);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--texto-oscuro);
        }

        .navbar-custom {
            background: linear-gradient(135deg, var(--morado) 0%, var(--guinda) 100%);
            padding: 10px 0;
            box-shadow: 0 4px 25px var(--sombra);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s;
        }

        .navbar-custom .navbar-brand {
            color: var(--blanco) !important;
            font-weight: 800;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-custom .navbar-brand .logo-img {
            height: 45px;
            width: auto;
            border-radius: 10px;
            object-fit: contain;
        }

        .navbar-custom .navbar-brand span {
            color: #d4a0e0;
        }

        .navbar-custom .navbar-brand .soul {
            color: #e8c9f0;
            font-style: italic;
        }

        .btn-cerrar-sesion {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: var(--blanco);
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-cerrar-sesion:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
            color: var(--blanco);
        }

        .card-cuenta {
            border: none;
            border-radius: 20px;
            background: var(--blanco);
            box-shadow: 0 4px 15px rgba(122, 31, 161, 0.08);
            padding: 30px;
        }

        .titulo-pagina {
            color: var(--morado);
            font-weight: 800;
        }

        .titulo-pagina i {
            color: var(--guinda);
            margin-right: 12px;
        }

        .info-cliente {
            background: #f8f4f0;
            border-radius: 16px;
            padding: 20px 24px;
        }

        .info-cliente .label {
            color: #6c5a4a;
            font-size: 0.85rem;
        }

        .info-cliente .valor {
            font-weight: 700;
            color: var(--texto-oscuro);
            font-size: 1.05rem;
        }

        .badge-estado {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-estado.pendiente {
            background: #ffc107;
            color: #000;
        }

        .badge-estado.confirmado {
            background: #17a2b8;
            color: #fff;
        }

        .badge-estado.preparando {
            background: #007bff;
            color: #fff;
        }

        .badge-estado.entregado {
            background: #28a745;
            color: #fff;
        }

        .badge-estado.cancelado {
            background: #dc3545;
            color: #fff;
        }

        .badge-estado.devolucion {
            background: #fd7e14;
            color: #fff;
        }

        .table-pedidos thead {
            background: linear-gradient(135deg, var(--morado), var(--guinda));
            color: var(--blanco);
        }

        .table-pedidos thead th {
            padding: 12px 16px;
            font-weight: 600;
            border: none;
        }

        .table-pedidos tbody td {
            padding: 14px 16px;
            vertical-align: middle;
            border-bottom: 1px solid #f0e8e0;
        }

        .sin-pedidos {
            text-align: center;
            padding: 40px 20px;
        }

        .sin-pedidos i {
            font-size: 3rem;
            color: var(--morado);
            opacity: 0.3;
        }

        .btn-volver-tienda {
            background: linear-gradient(135deg, var(--morado), var(--guinda));
            color: var(--blanco);
            border: none;
            border-radius: 50px;
            padding: 12px 35px;
            font-weight: 700;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-volver-tienda:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px var(--sombra);
            color: var(--blanco);
        }

        /* Badge de pedido reciente */
        .badge-nuevo {
            background: var(--guinda);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            .navbar-custom .navbar-brand .logo-img {
                height: 35px;
            }
            .card-cuenta {
                padding: 20px;
            }
            .info-cliente {
                padding: 16px;
            }
        }

        @media (max-width: 576px) {
            .navbar-custom .navbar-brand {
                font-size: 1.1rem;
            }
            .navbar-custom .navbar-brand .logo-img {
                height: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- ==========================================
    NAVBAR
    ========================================== -->
    <nav class="navbar navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="/img/borde.png" alt="Envelope Soul Café" class="logo-img" onerror="this.style.display='none'">
                Envelope <span class="soul">Soul</span> <span>Café</span>
            </a>
            <div>
                <a href="tienda.html" class="btn-cerrar-sesion me-2">
                    <i class="fas fa-store"></i> Tienda
                </a>
                <button onclick="cerrarSesion()" class="btn-cerrar-sesion">
                    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                </button>
            </div>
        </div>
    </nav>

    <!-- ==========================================
    CONTENIDO
    ========================================== -->
    <div class="container py-5">
        <div class="card-cuenta">
            <h2 class="titulo-pagina">
                <i class="fas fa-user-circle"></i> Mi Cuenta
            </h2>

            <!-- Información del cliente -->
            <div class="info-cliente mt-3" id="info-cliente">
                <!-- Se llena con JavaScript -->
            </div>

            <hr>

            <!-- Título de pedidos -->
            <h5 class="fw-bold mt-3" style="color: var(--morado);">
                <i class="fas fa-history me-2" style="color: var(--guinda);"></i> Mis Pedidos
                <span id="contador-pedidos" class="badge" style="background: var(--morado); color: white;"></span>
            </h5>

            <!-- Lista de pedidos -->
            <div id="lista-pedidos">
                <!-- Se llena con JavaScript -->
            </div>

            <!-- Botón para ir a la tienda -->
            <div class="text-center mt-4">
                <a href="tienda.html" class="btn-volver-tienda">
                    <i class="fas fa-shopping-bag me-2"></i> Seguir comprando
                </a>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CARGAR INFORMACIÓN DEL CLIENTE
        // ==========================================
        function cargarInfoCliente() {
            const sesion = JSON.parse(localStorage.getItem('cliente_sesion'));

            if (!sesion) {
                window.location.href = 'login-cliente.html';
                return;
            }

            const info = document.getElementById('info-cliente');
            info.innerHTML = `
                <div class="row">
                    <div class="col-md-4">
                        <div class="label">👤 Nombre</div>
                        <div class="valor">${sesion.nombre}</div>
                    </div>
                    <div class="col-md-4">
                        <div class="label">📧 Email</div>
                        <div class="valor">${sesion.email}</div>
                    </div>
                    <div class="col-md-4">
                        <div class="label">📱 Teléfono</div>
                        <div class="valor">${sesion.telefono || 'No registrado'}</div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // CARGAR PEDIDOS DEL CLIENTE
        // ==========================================
        async function cargarPedidos() {
            const sesion = JSON.parse(localStorage.getItem('cliente_sesion'));
            const contenedor = document.getElementById('lista-pedidos');
            const contador = document.getElementById('contador-pedidos');

            if (!sesion || !sesion._id) {
                contenedor.innerHTML = `
                    <div class="sin-pedidos">
                        <i class="fas fa-exclamation-circle"></i>
                        <h5 class="mt-2">Error de sesión</h5>
                        <p class="text-muted">Por favor inicia sesión nuevamente.</p>
                        <a href="login-cliente.html" class="btn-volver-tienda mt-2" style="font-size: 0.9rem; padding: 8px 25px;">
                            <i class="fas fa-sign-in-alt me-2"></i> Iniciar sesión
                        </a>
                    </div>
                `;
                return;
            }

            try {
                const res = await fetch(`/api/clientes/${sesion._id}/pedidos`);
                
                // Si el endpoint devuelve error 404 o 500, mostrar mensaje
                if (!res.ok) {
                    throw new Error('Error al cargar pedidos');
                }

                const pedidos = await res.json();

                // Actualizar contador
                contador.textContent = pedidos.length > 0 ? `(${pedidos.length})` : '';

                if (!pedidos || pedidos.length === 0) {
                    contenedor.innerHTML = `
                        <div class="sin-pedidos">
                            <i class="fas fa-receipt"></i>
                            <h5 class="mt-2">Aún no tienes pedidos</h5>
                            <p class="text-muted">¡Realiza tu primera compra y vive la experiencia Envelope Soul!</p>
                            <a href="tienda.html" class="btn-volver-tienda mt-2" style="font-size: 0.9rem; padding: 8px 25px;">
                                <i class="fas fa-shopping-bag me-2"></i> Ir a la tienda
                            </a>
                        </div>
                    `;
                    return;
                }

                let html = `
                    <div class="table-responsive mt-3">
                        <table class="table table-pedidos">
                            <thead>
                                <tr>
                                    <th># Pedido</th>
                                    <th>Fecha</th>
                                    <th>Productos</th>
                                    <th>Total</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                pedidos.forEach((pedido, index) => {
                    const fecha = new Date(pedido.fecha);
                    const fechaFormateada = !isNaN(fecha.getTime()) ? 
                        fecha.toLocaleDateString('es-MX', {
                            day: '2-digit',
                            month: '2-digit',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        }) : 'Fecha no disponible';

                    // Mostrar productos correctamente
                    let productosTexto = 'Sin productos';
                    if (pedido.productos && Array.isArray(pedido.productos) && pedido.productos.length > 0) {
                        productosTexto = pedido.productos.map(p => {
                            const nombre = p.nombre || 'Producto';
                            const cantidad = p.cantidad || 1;
                            const tamaño = p.tamaño ? ` (${p.tamaño})` : '';
                            return `${nombre}${tamaño} x${cantidad}`;
                        }).join(', ');
                    }

                    const estadoClass = pedido.estado ? pedido.estado.toLowerCase() : 'pendiente';
                    const estadoLabel = pedido.estado || 'Pendiente';
                    const total = pedido.total || 0;

                    html += `
                        <tr>
                            <td><strong>#${index + 1}</strong></td>
                            <td>${fechaFormateada}</td>
                            <td class="text-start small">${productosTexto}</td>
                            <td class="fw-bold text-success">$${total.toFixed(2)}</td>
                            <td><span class="badge-estado ${estadoClass}">${estadoLabel}</span></td>
                        </tr>
                    `;
                });

                html += `
                            </tbody>
                        </table>
                    </div>
                `;

                contenedor.innerHTML = html;

            } catch (error) {
                console.error('Error al cargar pedidos:', error);
                contenedor.innerHTML = `
                    <div class="sin-pedidos">
                        <i class="fas fa-exclamation-circle"></i>
                        <h5 class="mt-2">No se pudieron cargar tus pedidos</h5>
                        <p class="text-muted">Intenta nuevamente más tarde.</p>
                        <button onclick="cargarPedidos()" class="btn-volver-tienda mt-2" style="font-size: 0.9rem; padding: 8px 25px; background: var(--morado);">
                            <i class="fas fa-sync me-2"></i> Reintentar
                        </button>
                    </div>
                `;
            }
        }

        // ==========================================
        // CERRAR SESIÓN
        // ==========================================
        function cerrarSesion() {
            if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
                localStorage.removeItem('cliente_sesion');
                // También limpiar datos de pedido pendiente
                localStorage.removeItem('pedido_pendiente');
                window.location.href = 'index.html';
            }
        }

        // ==========================================
        // VERIFICAR SI VIENE DE REGISTRO EXITOSO
        // ==========================================
        function verificarRegistroExitoso() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('registro_exitoso') === 'true') {
                // Mostrar mensaje de bienvenida
                const sesion = JSON.parse(localStorage.getItem('cliente_sesion'));
                if (sesion) {
                    const info = document.getElementById('info-cliente');
                    info.innerHTML = `
                        <div class="alert alert-success mb-0">
                            <i class="fas fa-check-circle me-2"></i>
                            ¡Bienvenido <strong>${sesion.nombre}</strong>! Tu cuenta ha sido creada exitosamente.
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-4">
                                <div class="label">👤 Nombre</div>
                                <div class="valor">${sesion.nombre}</div>
                            </div>
                            <div class="col-md-4">
                                <div class="label">📧 Email</div>
                                <div class="valor">${sesion.email}</div>
                            </div>
                            <div class="col-md-4">
                                <div class="label">📱 Teléfono</div>
                                <div class="valor">${sesion.telefono || 'No registrado'}</div>
                            </div>
                        </div>
                    `;
                }
            }
        }

        // ==========================================
        // INICIALIZAR
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            // Verificar si hay sesión
            const sesion = JSON.parse(localStorage.getItem('cliente_sesion'));
            if (!sesion) {
                // Intentar recuperar sesión de pedido pendiente
                const pedidoPendiente = JSON.parse(localStorage.getItem('pedido_pendiente'));
                if (pedidoPendiente && pedidoPendiente.datos) {
                    // Redirigir a registro si hay pedido pendiente
                    window.location.href = 'registro-cliente.html?from=checkout';
                    return;
                }
                window.location.href = 'login-cliente.html';
                return;
            }

            verificarRegistroExitoso();
            cargarInfoCliente();
            cargarPedidos();
        });
    </script>
</body>
</html>
