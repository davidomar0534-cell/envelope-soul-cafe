<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Envelope Soul Café</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --morado: #7A1FA1;
            --morado-oscuro: #5a1678;
            --guinda: #670A2B;
            --guinda-claro: #8a0f3a;
            --blanco: #FEFEFF;
            --crema: #f5f0eb;
            --texto-oscuro: #2d1a1a;
            --sombra: rgba(122, 31, 161, 0.2);
        }

        body {
            background: var(--crema);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-registro {
            max-width: 480px;
            width: 100%;
            background: var(--blanco);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 8px 40px var(--sombra);
        }

        .card-registro .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .card-registro .logo img {
            height: 60px;
            width: auto;
        }

        .card-registro .logo h4 {
            color: var(--morado);
            font-weight: 800;
            margin-top: 8px;
        }

        .card-registro .logo h4 span {
            color: var(--guinda);
        }

        .card-registro .logo .soul {
            color: var(--morado-oscuro);
            font-style: italic;
        }

        .form-label {
            font-weight: 600;
            color: var(--texto-oscuro);
            font-size: 0.9rem;
        }

        .form-control {
            border: 2px solid #e8e0d8;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.3s;
            background: #faf8f6;
        }

        .form-control:focus {
            border-color: var(--morado);
            outline: none;
            box-shadow: 0 0 0 4px rgba(122, 31, 161, 0.1);
        }

        .btn-registrar {
            background: linear-gradient(135deg, var(--morado), var(--guinda));
            color: var(--blanco);
            border: none;
            border-radius: 50px;
            padding: 14px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-registrar:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px var(--sombra);
            color: var(--blanco);
        }

        .btn-registrar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .link-login {
            color: var(--morado);
            font-weight: 600;
            text-decoration: none;
        }

        .link-login:hover {
            color: var(--guinda);
            text-decoration: underline;
        }

        .alert-custom {
            border-radius: 12px;
            padding: 12px 16px;
        }

        .password-requirements {
            font-size: 0.8rem;
            color: #6c5a4a;
            margin-top: 4px;
        }

        .password-requirements .valid {
            color: #28a745;
        }

        .password-requirements .invalid {
            color: #dc3545;
        }

        @media (max-width: 576px) {
            .card-registro {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="card-registro">
        <!-- Logo -->
        <div class="logo">
            <img src="/img/borde.png" alt="Envelope Soul Café" onerror="this.style.display='none'">
            <h4>Envelope <span class="soul">Soul</span> <span>Café</span></h4>
        </div>

        <h5 class="text-center mb-3 fw-bold" style="color: var(--texto-oscuro);">
            <i class="fas fa-user-plus me-2" style="color: var(--morado);"></i> Crear cuenta
        </h5>

        <div id="mensaje" class="alert-custom" style="display: none;"></div>

        <form id="form-registro">
            <div class="mb-3">
                <label class="form-label" for="nombre"><i class="fas fa-user me-1"></i> Nombre completo</label>
                <input type="text" class="form-control" id="nombre" placeholder="Ej: Juan Pérez" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="email"><i class="fas fa-envelope me-1"></i> Correo electrónico</label>
                <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="telefono"><i class="fas fa-phone me-1"></i> Teléfono (opcional)</label>
                <input type="tel" class="form-control" id="telefono" placeholder="55 1234 5678">
            </div>

            <div class="mb-3">
                <label class="form-label" for="password"><i class="fas fa-lock me-1"></i> Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
                <div class="password-requirements">
                    <span id="req-length" class="invalid"><i class="fas fa-circle"></i> Mínimo 6 caracteres</span>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label" for="confirm-password"><i class="fas fa-check-circle me-1"></i> Confirmar contraseña</label>
                <input type="password" class="form-control" id="confirm-password" placeholder="Repite tu contraseña" required>
            </div>

            <button type="submit" class="btn-registrar" id="btn-registrar">
                <i class="fas fa-user-plus"></i> Registrarse
            </button>
        </form>

        <p class="text-center mt-3" style="color: #6c5a4a; font-size: 0.9rem;">
            ¿Ya tienes cuenta? <a href="login-cliente.html" class="link-login">Inicia sesión aquí</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ==========================================
        // VALIDAR CONTRASEÑA EN TIEMPO REAL
        // ==========================================
        const passwordInput = document.getElementById('password');
        const reqLength = document.getElementById('req-length');

        passwordInput.addEventListener('input', function() {
            if (this.value.length >= 6) {
                reqLength.className = 'valid';
                reqLength.innerHTML = '<i class="fas fa-check-circle"></i> Mínimo 6 caracteres';
            } else {
                reqLength.className = 'invalid';
                reqLength.innerHTML = '<i class="fas fa-circle"></i> Mínimo 6 caracteres';
            }
        });

        // ==========================================
        // PRECARGAR DATOS SI VIENE DE CHECKOUT
        // ==========================================
        function precargarDatos() {
            const pedidoPendiente = JSON.parse(localStorage.getItem('pedido_pendiente'));
            if (pedidoPendiente && pedidoPendiente.datos) {
                const datos = pedidoPendiente.datos;
                if (datos.nombre) document.getElementById('nombre').value = datos.nombre;
                if (datos.email) document.getElementById('email').value = datos.email;
                if (datos.telefono) document.getElementById('telefono').value = datos.telefono;
            }
        }

        // ==========================================
        // MOSTRAR MENSAJE
        // ==========================================
        function mostrarMensaje(texto, tipo) {
            const mensaje = document.getElementById('mensaje');
            mensaje.style.display = 'block';
            mensaje.className = `alert-custom alert alert-${tipo}`;
            mensaje.innerHTML = texto;
        }

        // ==========================================
        // ASOCIAR PEDIDO AL CLIENTE (MEJORADO)
        // ==========================================
        async function asociarPedidoCliente(clienteId, clienteNombre, clienteEmail) {
            const pedidoPendiente = JSON.parse(localStorage.getItem('pedido_pendiente'));
            
            // Verificar si hay pedido pendiente
            if (!pedidoPendiente) {
                console.log('ℹ️ No hay pedido pendiente en localStorage');
                return;
            }

            if (!pedidoPendiente.pedido || !pedidoPendiente.pedido._id) {
                console.log('ℹ️ El pedido pendiente no tiene ID válido');
                return;
            }

            console.log('🔄 Intentando asociar pedido:', pedidoPendiente.pedido._id);
            console.log('🔑 Cliente ID:', clienteId);

            try {
                const res = await fetch('/api/pedidos/asociar-cliente', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pedido_id: pedidoPendiente.pedido._id,
                        cliente_id: clienteId,
                        cliente_nombre: clienteNombre,
                        cliente_email: clienteEmail
                    })
                });

                const data = await res.json();
                console.log('📊 Resultado de asociación:', data);
                
                if (data.success) {
                    console.log('✅ Pedido asociado correctamente');
                    // Limpiar el pedido pendiente después de asociarlo
                    localStorage.removeItem('pedido_pendiente');
                    return true;
                } else {
                    console.log('⚠️ Error al asociar pedido:', data.mensaje);
                    return false;
                }
            } catch (error) {
                console.error('❌ Error al asociar pedido:', error);
                return false;
            }
        }

        // ==========================================
        // ENVIAR REGISTRO
        // ==========================================
        document.getElementById('form-registro').addEventListener('submit', async function(e) {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!nombre || !email || !password) {
                mostrarMensaje('Por favor completa todos los campos obligatorios.', 'danger');
                return;
            }

            if (password !== confirmPassword) {
                mostrarMensaje('Las contraseñas no coinciden.', 'danger');
                return;
            }

            if (password.length < 6) {
                mostrarMensaje('La contraseña debe tener al menos 6 caracteres.', 'danger');
                return;
            }

            const btn = document.getElementById('btn-registrar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registrando...';

            try {
                const res = await fetch('/api/clientes/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, telefono, password })
                });

                const data = await res.json();

                if (data.success) {
                    mostrarMensaje('✅ ' + data.mensaje, 'success');

                    // Guardar sesión
                    localStorage.setItem('cliente_sesion', JSON.stringify(data.cliente));

                    // ASOCIAR PEDIDO PENDIENTE
                    await asociarPedidoCliente(data.cliente._id, nombre, email);
                    
                    // Limpiar pedido pendiente
                    localStorage.removeItem('pedido_pendiente');

                    setTimeout(() => {
                        window.location.href = 'mi-cuenta.html?registro_exitoso=true';
                    }, 1500);
                } else {
                    mostrarMensaje('❌ ' + data.mensaje, 'danger');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Registrarse';
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('❌ Error al conectar con el servidor.', 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Registrarse';
            }
        });

        // ==========================================
        // INICIALIZAR
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            precargarDatos();
        });
    </script>
</body>
</html>
