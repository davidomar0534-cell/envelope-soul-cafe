<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Pedido Confirmado! | Coffee Cream and Sugar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ========================================
                   PALETA DE COLORES
           ======================================== */
        :root {
            --morado: #7A1FA1;
            --morado-oscuro: #5a1678;
            --guinda: #670A2B;
            --guinda-claro: #8a0f3a;
            --blanco: #FEFEFF;
            --crema: #f5f0eb;
            --texto-oscuro: #2d1a1a;
            --sombra: rgba(122, 31, 161, 0.2);
        }

        body {
            background: var(--crema);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--texto-oscuro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========================================
                   NAVBAR
           ======================================== */
        .navbar-custom {
            background: linear-gradient(135deg, var(--morado) 0%, var(--guinda) 100%);
            padding: 16px 0;
            box-shadow: 0 4px 20px rgba(122, 31, 161, 0.3);
        }

        .navbar-custom .navbar-brand {
            color: var(--blanco) !important;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .navbar-custom .navbar-brand span {
            color: #e8c9f0;
        }

        /* ========================================
                   CONTENIDO PRINCIPAL
           ======================================== */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card-confirmacion {
            max-width: 600px;
            width: 100%;
            background: var(--blanco);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 8px 40px rgba(122, 31, 161, 0.12);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card-confirmacion::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--morado), var(--guinda), var(--morado));
        }

        /* ========================================
                   ICONO DE ÉXITO
           ======================================== */
        .icono-exito {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--morado), var(--guinda));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 48px;
            color: var(--blanco);
            box-shadow: 0 8px 30px rgba(122, 31, 161, 0.3);
            animation: pulso 2s ease-in-out infinite;
        }

        @keyframes pulso {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ========================================
                   TEXTO
           ======================================== */
        .titulo-exito {
            font-size: 2rem;
            font-weight: 800;
            color: var(--morado);
            margin-bottom: 8px;
        }

        .subtitulo-exito {
            color: #6c5a4a;
            font-size: 1.1rem;
            margin-bottom: 24px;
        }

        .numero-pedido {
            background: #f8f4f0;
            border-radius: 12px;
            padding: 12px 20px;
            display: inline-block;
            font-weight: 700;
            color: var(--texto-oscuro);
            margin-bottom: 24px;
        }

        .numero-pedido span {
            color: var(--morado);
            font-weight: 800;
        }

        /* ========================================
                   DETALLES DEL PEDIDO
           ======================================== */
        .detalles-pedido {
            background: #faf8f6;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .detalle-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.95rem;
            border-bottom: 1px solid #f0e8e0;
        }

        .detalle-item:last-child {
            border-bottom: none;
        }

        .detalle-item .label {
            color: #6c5a4a;
        }

        .detalle-item .valor {
            font-weight: 600;
            color: var(--texto-oscuro);
        }

        .detalle-item .valor.total {
            color: var(--morado);
            font-size: 1.1rem;
            font-weight: 800;
        }

        /* ========================================
                   BOTONES
           ======================================== */
        .btn-seguir-comprando {
            background: linear-gradient(135deg, var(--morado), var(--guinda));
            color: var(--blanco);
            border: none;
            border-radius: 50px;
            padding: 14px 40px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-seguir-comprando:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(122, 31, 161, 0.3);
            color: var(--blanco);
        }

        .btn-ver-pedidos {
            background: transparent;
            color: var(--morado);
            border: 2px solid var(--morado);
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-ver-pedidos:hover {
            background: var(--morado);
            color: var(--blanco);
        }

        /* ========================================
                   RESPONSIVE
           ======================================== */
        @media (max-width: 576px) {
            .card-confirmacion {
                padding: 32px 20px;
            }
            .titulo-exito {
                font-size: 1.5rem;
            }
            .icono-exito {
                width: 80px;
                height: 80px;
                font-size: 36px;
            }
        }
    </style>
</head>
<body>

    <!-- ==========================================
    NAVBAR
    ========================================== -->
    <nav class="navbar navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="tienda.html">
                ☕ Coffee Cream <span>and</span> Sugar
            </a>
        </div>
    </nav>

    <!-- ==========================================
    CONTENIDO PRINCIPAL
    ========================================== -->
    <div class="main-content">
        <div class="card-confirmacion">

            <!-- Icono de éxito -->
            <div class="icono-exito">
                <i class="fas fa-check"></i>
            </div>

            <!-- Título -->
            <h1 class="titulo-exito">¡Pedido Confirmado!</h1>
            <p class="subtitulo-exito">Tu pedido ha sido registrado exitosamente. ¡Gracias por tu compra!</p>

            <!-- Número de pedido -->
            <div class="numero-pedido">
                <i class="fas fa-receipt me-2"></i> Número de pedido: <span id="numero-pedido">---</span>
            </div>

            <!-- Detalles del pedido -->
            <div class="detalles-pedido" id="detalles-pedido">
                <!-- Se llena con JavaScript -->
            </div>

            <!-- Próximos pasos -->
            <p class="text-muted small mb-4">
                <i class="fas fa-clock me-1"></i>
                Tu pedido está siendo procesado. En breve recibirás un correo con la confirmación.
            </p>

            <!-- Botones -->
            <div class="d-flex flex-wrap gap-3 justify-content-center">
                <a href="tienda.html" class="btn-seguir-comprando">
                    <i class="fas fa-shopping-bag me-2"></i> Seguir comprando
                </a>
                <a href="mi-cuenta.html" class="btn-ver-pedidos">
                    <i class="fas fa-list me-2"></i> Ver mis pedidos
                </a>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // CARGAR DATOS DEL PEDIDO
        // ==========================================
        function cargarDatosPedido() {
            const pedidoData = localStorage.getItem('ultimo-pedido');

            if (!pedidoData) {
                // Si no hay pedido, redirigir a la tienda
                window.location.href = 'tienda.html';
                return;
            }

            const pedido = JSON.parse(pedidoData);
            const numeroPedido = pedido._id || '#' + Math.random().toString(36).substring(2, 10).toUpperCase();
            const total = pedido.total || 0;
            const productos = pedido.productos || [];
            const metodoPago = pedido.metodo_pago || 'No especificado';

            // Mostrar número de pedido
            document.getElementById('numero-pedido').textContent = numeroPedido;

            // Mostrar detalles
            let html = `
                <div class="detalle-item">
                    <span class="label">📦 Productos</span>
                    <span class="valor">${productos.length} items</span>
                </div>
                <div class="detalle-item">
                    <span class="label">💳 Método de pago</span>
                    <span class="valor">${metodoPago}</span>
                </div>
                <div class="detalle-item">
                    <span class="label">📅 Fecha</span>
                    <span class="valor">${new Date().toLocaleDateString('es-MX')}</span>
                </div>
                <div class="detalle-item" style="border-top: 2px solid var(--morado); padding-top: 10px; margin-top: 6px;">
                    <span class="label fw-bold">💰 Total</span>
                    <span class="valor total">$${total.toFixed(2)}</span>
                </div>
            `;

            // Lista de productos
            if (productos.length > 0) {
                html += `<div class="mt-3" style="border-top: 1px solid #f0e8e0; padding-top: 10px;">`;
                productos.forEach(item => {
                    const subtotal = (item.precio || 0) * (item.cantidad || 1);
                    html += `
                        <div class="detalle-item" style="font-size: 0.85rem; padding: 3px 0;">
                            <span class="label">${item.nombre} <small class="text-muted">(${item.tamaño || 'Único'})</small> x${item.cantidad}</span>
                            <span class="valor">$${subtotal.toFixed(2)}</span>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            document.getElementById('detalles-pedido').innerHTML = html;
        }

        // ==========================================
        // INICIALIZAR
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            cargarDatosPedido();
        });
    </script>
</body>
</html>
