<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Envelope Soul Café</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ========================================
                   PALETA DE COLORES
           ======================================== */
        :root {
            --morado: #7A1FA1;
            --morado-oscuro: #5a1678;
            --guinda: #670A2B;
            --guinda-claro: #8a0f3a;
            --blanco: #FEFEFF;
            --crema: #f5f0eb;
            --texto-oscuro: #2d1a1a;
            --sombra: rgba(122, 31, 161, 0.25);
        }

        body {
            background: linear-gradient(135deg, var(--morado) 0%, var(--guinda) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* ========================================
                   CARD DE LOGIN
           ======================================== */
        .card-login {
            width: 100%;
            max-width: 440px;
            border-radius: 24px;
            border: none;
            padding: 40px 35px;
            background: var(--blanco);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--morado), var(--guinda), var(--morado));
        }

        /* ========================================
                   LOGO
           ======================================== */
        .logo-container {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-img {
            max-width: 80px;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 4px 20px var(--sombra);
            padding: 6px;
            background: var(--blanco);
        }

        .brand-title {
            color: var(--morado);
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            margin-top: 12px;
        }

        .brand-title .soul {
            color: var(--guinda);
            font-style: italic;
        }

        .brand-subtitle {
            color: #8a7a6a;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: -4px;
        }

        /* ========================================
                   FORMULARIO
           ======================================== */
        .form-label {
            color: var(--texto-oscuro);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 2px solid #e8e0d8;
            background-color: #faf8f6;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .form-control:focus {
            background-color: var(--blanco);
            border-color: var(--morado);
            box-shadow: 0 0 0 4px rgba(122, 31, 161, 0.1);
            color: var(--texto-oscuro);
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #b0a090;
            font-size: 1rem;
        }

        .input-icon .form-control {
            padding-left: 44px;
        }

        /* ========================================
                   BOTÓN
           ======================================== */
        .btn-login {
            background: linear-gradient(135deg, var(--morado), var(--guinda));
            color: var(--blanco);
            width: 100%;
            border-radius: 50px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.3s ease;
            border: none;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--sombra);
            color: var(--blanco);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .btn-login i {
            margin-right: 10px;
        }

        /* ========================================
                   MENSAJES
           ======================================== */
        .alert-custom {
            font-size: 0.9rem;
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 16px;
            background-color: #fce8e6;
            border: 1px solid #f5c2c1;
            color: #c0392b;
            display: none;
        }

        .alert-custom.show {
            display: block;
        }

        .alert-custom i {
            margin-right: 8px;
        }

        /* ========================================
                   PIE DE PÁGINA
           ======================================== */
        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #b0a090;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .footer-text a {
            color: var(--morado);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            color: var(--guinda);
        }

        /* ========================================
                   RESPONSIVE
           ======================================== */
        @media (max-width: 576px) {
            .card-login {
                padding: 30px 20px;
            }
            .brand-title {
                font-size: 1.3rem;
            }
            .logo-img {
                max-width: 65px;
            }
        }
    </style>
</head>
<body>

    <div class="card-login">

        <!-- ==========================================
        LOGO Y TÍTULO
        ========================================== -->
        <div class="logo-container">
            <img src="/img/borde.png" alt="Envelope Soul Café" class="logo-img" onerror="this.style.display='none'">
            <h1 class="brand-title">
                Envelope <span class="soul">Soul</span> Café
            </h1>
            <p class="brand-subtitle">Control de Acceso</p>
        </div>

        <!-- ==========================================
        FORMULARIO
        ========================================== -->
        <form id="form-login">
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-user me-1"></i> Usuario</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="usuario" class="form-control" placeholder="Ingresa tu usuario" required autocomplete="username">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label"><i class="fas fa-lock me-1"></i> Contraseña</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="contraseña" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-login" id="btn-login">
                <i class="fas fa-sign-in-alt"></i> Ingresar al Panel
            </button>
        </form>

        <!-- ==========================================
        MENSAJE DE ERROR
        ========================================== -->
        <div id="mensaje" class="alert-custom">
            <i class="fas fa-exclamation-circle"></i>
            <span id="mensaje-texto"></span>
        </div>

        <!-- ==========================================
        PIE
        ========================================== -->
        <div class="footer-text">
            &copy; 2026 Envelope Soul Café · <a href="index.html">Ir a la tienda</a>
        </div>

    </div>

    <script>
        // ==========================================
        // FUNCIONES DE SESIÓN
        // ==========================================
        function guardarEnSesion(llave, valor) {
            try { sessionStorage.setItem(llave, valor); } catch (e) { console.warn("Storage restringido:", e.message); }
        }

        function obtenerDeSesion(llave) {
            try { return sessionStorage.getItem(llave); } catch (e) { return null; }
        }

        // ==========================================
        // MOSTRAR MENSAJE
        // ==========================================
        function mostrarMensaje(texto, tipo = 'error') {
            const mensaje = document.getElementById('mensaje');
            const mensajeTexto = document.getElementById('mensaje-texto');
            mensajeTexto.textContent = texto;

            if (tipo === 'error') {
                mensaje.style.backgroundColor = '#fce8e6';
                mensaje.style.borderColor = '#f5c2c1';
                mensaje.style.color = '#c0392b';
            } else {
                mensaje.style.backgroundColor = '#e8f5e9';
                mensaje.style.borderColor = '#a5d6a7';
                mensaje.style.color = '#2e7d32';
            }

            mensaje.classList.add('show');
        }

        function ocultarMensaje() {
            document.getElementById('mensaje').classList.remove('show');
        }

        // ==========================================
        // ENVIAR LOGIN
        // ==========================================
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            ocultarMensaje();

            const usua = document.getElementById('usuario').value.trim();
            const contra = document.getElementById('contraseña').value;
            const btn = document.getElementById('btn-login');

            if (!usua || !contra) {
                mostrarMensaje('Por favor ingresa usuario y contraseña.', 'error');
                return;
            }

            // Deshabilitar botón
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usua, contra })
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok || !data.success) {
                    mostrarMensaje(data.mensaje || 'Credenciales incorrectas. Intenta de nuevo.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar al Panel';
                    return;
                }

                if (data.success && data.rol) {
                    const rolLimpio = data.rol.toLowerCase().trim();

                    guardarEnSesion('id_usuario', data._id);
                    guardarEnSesion('usuario', data.usuario);
                    guardarEnSesion('rol', rolLimpio);

                    if (rolLimpio === 'admin') {
                        window.location.href = "admin.html";
                    } else if (rolLimpio === 'cajero') {
                        window.location.href = "cajero.html";
                    } else {
                        mostrarMensaje(`Error: El rol asignado (${data.rol}) no está configurado.`, 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar al Panel';
                    }
                } else {
                    mostrarMensaje('Error en la estructura de respuesta del servidor.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar al Panel';
                }
            } catch (err) {
                console.error("Error en fetch:", err);
                mostrarMensaje('Error al conectar con el servidor. Verifica tu conexión.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar al Panel';
            }
        });

        // ==========================================
        // REDIRECCIÓN SI YA ESTÁ LOGUEADO
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            const rolActivo = obtenerDeSesion('rol');
            if (rolActivo) {
                const rolLimpio = rolActivo.toLowerCase().trim();
                if (rolLimpio === 'admin') {
                    window.location.href = "admin.html";
                } else if (rolLimpio === 'cajero') {
                    window.location.href = "cajero.html";
                }
            }
        });
    </script>

</body>
</html>
