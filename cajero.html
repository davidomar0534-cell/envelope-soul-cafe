<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Cajero | Envelope Soul Café</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ========================================
                   PALETA DE COLORES
           ======================================== */
        :root {
            --morado: #7A1FA1;
            --morado-oscuro: #5a1678;
            --guinda: #670A2B;
            --guinda-claro: #8a0f3a;
            --blanco: #FEFEFF;
            --crema: #f5f0eb;
            --texto-oscuro: #2d1a1a;
            --sombra: rgba(122, 31, 161, 0.25);
        }

        body {
            background: var(--crema);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--texto-oscuro);
        }

        /* ========================================
                   NAVBAR CON LOGO
           ======================================== */
        .navbar-custom {
            background: linear-gradient(135deg, var(--morado) 0%, var(--guinda) 100%);
            padding: 10px 0;
            box-shadow: 0 4px 25px var(--sombra);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s;
        }

        .navbar-custom .navbar-brand {
            color: var(--blanco) !important;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 1px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-custom .navbar-brand:hover {
            transform: scale(1.02);
        }

        .navbar-custom .navbar-brand .logo-img {
            height: 45px;
            width: auto;
            border-radius: 10px;
            object-fit: contain;
        }

        .navbar-custom .navbar-brand span {
            color: #d4a0e0;
        }

        .navbar-custom .navbar-brand .soul {
            color: #e8c9f0;
            font-style: italic;
        }

        .btn-principal {
            background: linear-gradient(135deg, var(--morado), var(--guinda));
            color: var(--blanco);
            border: none;
            border-radius: 50px;
            padding: 10px 24px;
            font-weight: 700;
            transition: all 0.3s;
        }

        .btn-principal:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px var(--sombra);
            color: var(--blanco);
        }

        .btn-danger-custom {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: var(--blanco);
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-danger-custom:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
            color: var(--blanco);
        }

        .btn-ver-pedidos {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: var(--blanco);
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-ver-pedidos:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
            color: var(--blanco);
        }

        .precio {
            color: var(--morado);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .card-producto {
            border-radius: 15px;
            border: none;
            transition: transform 0.2s;
            height: 100%;
            overflow: hidden;
        }

        .card-producto:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px var(--sombra);
        }

        .titulo-seccion {
            color: var(--morado);
            font-weight: bold;
        }

        .titulo-seccion i {
            color: var(--guinda);
            margin-right: 8px;
        }

        .table thead {
            background: linear-gradient(135deg, var(--morado), var(--guinda));
            color: var(--blanco);
        }

        .table thead th {
            border: none;
            padding: 12px 16px;
            font-weight: 600;
        }

        .badge-tamano {
            background-color: #D9944E;
            color: #fff;
        }

        .badge-chico {
            background-color: #28A745;
            color: #fff;
        }

        .badge-grande {
            background-color: #007BFF;
            color: #fff;
        }

        .badge-estado {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-estado.pendiente {
            background: #ffc107;
            color: #000;
        }

        .badge-estado.confirmado {
            background: #17a2b8;
            color: #fff;
        }

        .badge-estado.preparando {
            background: #007bff;
            color: #fff;
        }

        .badge-estado.listoo {
            background: #28a745;
            color: #fff;
        }

        .badge-estado.entregado {
            background: #28a745;
            color: #fff;
        }

        .badge-estado.cancelado {
            background: #dc3545;
            color: #fff;
        }

        .badge-estado.devolucion {
            background: #fd7e14;
            color: #fff;
        }

        .btn-estado {
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-estado:hover {
            transform: scale(1.05);
        }

        .btn-estado.confirmar {
            background: #17a2b8;
            color: #fff;
        }

        .btn-estado.preparar {
            background: #007bff;
            color: #fff;
        }

        .btn-estado.listoo {
            background: #28a745;
            color: #fff;
        }

        .btn-estado.entregar {
            background: #20c997;
            color: #fff;
        }

        .btn-estado.devolucion {
            background: #fd7e14;
            color: #fff;
        }

        .btn-estado.devolucion:hover {
            background: #e06b0a;
            transform: scale(1.05);
        }

        .btn-estado.cancelar {
            background: #dc3545;
            color: #fff;
        }

        .producto-imagen-wrapper {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #f8f4ee;
            position: relative;
        }

        .producto-imagen {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.4s ease;
            border-radius: 15px 15px 0 0;
            background: #f8f4ee;
            padding: 8px;
        }

        .card-producto:hover .producto-imagen {
            transform: scale(1.05);
        }

        .card-pedidos {
            border: none;
            border-radius: 20px;
            background: var(--blanco);
            box-shadow: 0 4px 15px var(--sombra);
            padding: 20px;
            margin-top: 20px;
        }

        .badge-origen {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        .badge-origen.tienda {
            background: var(--morado);
            color: #fff;
        }

        .badge-origen.cajero {
            background: var(--guinda);
            color: #fff;
        }

        .pedido-cliente {
            font-weight: 600;
            color: var(--morado);
        }

        .pedido-email {
            color: #6c5a4a;
            font-size: 0.8rem;
        }

        .btn-warning-custom {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: var(--blanco);
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-warning-custom:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
            color: var(--blanco);
        }

        @media (max-width: 768px) {
            .navbar-custom .navbar-brand .logo-img {
                height: 35px;
            }
            .producto-imagen-wrapper {
                height: 160px;
            }
        }
    </style>
</head>
<body>

    <!-- ==========================================
    NAVBAR CON LOGO
    ========================================== -->
    <nav class="navbar navbar-custom navbar-expand-lg mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="/img/borde.png" alt="Envelope Soul Café" class="logo-img" onerror="this.style.display='none'">
                Envelope <span class="soul">Soul</span> <span>Café</span>
            </a>
            <div class="d-flex gap-2">
                <span style="background: rgba(255,255,255,0.12);
                            backdrop-filter: blur(8px);
                            border: 1.5px solid rgba(255,255,255,0.15);
                            color: #fff;
                            border-radius: 50px;
                            padding: 6px 20px;
                            font-weight: 600;
                            font-size: 0.9rem;
                            display: inline-flex;
                            align-items: center;
                            gap: 8px;
                            cursor: default;
                            transition: all 0.3s;">
                    <i class="fas fa-user-tie" style="font-size: 0.95rem;"></i> Cajero
                </span>
                <button class="btn-warning-custom fw-bold" onclick="togglePedidos()">
                    <i class="fas fa-clipboard-list"></i> Pedidos
                </button>
                <a href="reporte_ventas.html" class="btn-warning-custom fw-bold">📊 Reporte</a>
                <button onclick="cerrarSesion()" class="btn-danger-custom fw-bold">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- ==========================================
        SECCIÓN DE PEDIDOS EN LÍNEA (OCULTA POR DEFECTO)
        ========================================== -->
        <div id="seccion-pedidos" class="card-pedidos" style="display: none;">
            <h4 class="titulo-seccion" style="margin-top: 0;">
                <i class="fas fa-clipboard-list"></i> Pedidos en Línea
            </h4>
            <div id="tabla-pedidos">
                <!-- Se llena con JavaScript -->
            </div>
        </div>

        <!-- ==========================================
        VENTA ACTUAL
        ========================================== -->
        <div class="card shadow p-4 mb-4 bg-white">
            <h4 class="titulo-seccion mb-3">
                <i class="fas fa-shopping-cart"></i> Venta Actual
            </h4>
            <div class="table-responsive">
                <table class="table table-bordered text-center align-middle">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Tamaño</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-carrito"></tbody>
                    <tfoot>
                        <tr>
                            <th colspan="4" class="text-end">TOTAL</th>
                            <th colspan="2" id="txt-total" class="text-success fs-5">$0.00</th>
                        </tr>
                    </tfoot>
                </table>
            </div>
            <button id="btn-registrar" class="btn-principal w-100 mt-2 fw-bold" onclick="procesarCobroFinal(event)">Registrar Venta</button>
        </div>

        <!-- ==========================================
        PRODUCTOS DISPONIBLES
        ========================================== -->
        <div class="card shadow p-4 mb-5 bg-white">
            <h4 class="titulo-seccion text-center mb-4">
                <i class="fas fa-boxes"></i> Productos Disponibles
            </h4>

            <h5 class="titulo-seccion mb-3">
                <i class="fas fa-fire"></i> Bebidas Calientes
            </h5>
            <div class="row mb-4" id="contenedor-calientes"></div>

            <h5 class="titulo-seccion mb-3">
                <i class="fas fa-snowflake"></i> Bebidas Frías
            </h5>
            <div class="row mb-4" id="contenedor-frias"></div>

            <h5 class="titulo-seccion mb-3">
                <i class="fas fa-cookie-bite"></i> Snacks
            </h5>
            <div class="row" id="contenedor-snacks"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let productosGlobal = [];

        // ==========================================
        // MOSTRAR/OCULTAR PEDIDOS
        // ==========================================
        let pedidosVisible = false;

        function togglePedidos() {
            pedidosVisible = !pedidosVisible;
            const seccion = document.getElementById('seccion-pedidos');
            if (pedidosVisible) {
                seccion.style.display = 'block';
                cargarPedidos();
            } else {
                seccion.style.display = 'none';
            }
        }

        // ==========================================
        // CARGAR PEDIDOS
        // ==========================================
        async function cargarPedidos() {
            const contenedor = document.getElementById('tabla-pedidos');

            try {
                const res = await fetch('/api/pedidos');
                const pedidos = await res.json();

                if (!pedidos || pedidos.length === 0) {
                    contenedor.innerHTML = `
                        <div class="text-center py-4">
                            <i class="fas fa-inbox" style="font-size: 3rem; color: var(--morado); opacity: 0.3;"></i>
                            <p class="mt-2 text-muted">No hay pedidos registrados</p>
                        </div>
                    `;
                    return;
                }

                let html = `
                    <div class="table-responsive">
                        <table class="table table-bordered text-center align-middle">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Cliente</th>
                                    <th>Productos</th>
                                    <th>Total</th>
                                    <th>Origen</th>
                                    <th>Estado</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                pedidos.forEach((pedido, index) => {
                    const fecha = new Date(pedido.fecha);
                    const fechaFormateada = !isNaN(fecha.getTime()) ?
                        fecha.toLocaleDateString('es-MX', {
                            day: '2-digit',
                            month: '2-digit',
                            hour: '2-digit',
                            minute: '2-digit'
                        }) : 'Fecha no disponible';

                    let productosTexto = 'Sin productos';
                    if (pedido.productos && Array.isArray(pedido.productos) && pedido.productos.length > 0) {
                        productosTexto = pedido.productos.map(p => {
                            const nombre = p.nombre || 'Producto';
                            const cantidad = p.cantidad || 1;
                            const tamaño = p.tamaño ? ` (${p.tamaño})` : '';
                            return `${nombre}${tamaño} x${cantidad}`;
                        }).join('<br>');
                    }

                    const nombreCliente = pedido.cliente?.nombre || 'Cliente anónimo';
                    const emailCliente = pedido.cliente?.email || '';
                    const origen = pedido.origen || 'cajero';
                    const origenBadge = origen === 'tienda_online' ? 'tienda' : 'cajero';
                    const estadoClass = pedido.estado ? pedido.estado.toLowerCase() : 'pendiente';
                    const estadoLabel = pedido.estado || 'Pendiente';
                    const total = pedido.total || 0;

                    // Mostrar botones según el estado actual
                    let botonesAccion = '';
                    const estadoActual = pedido.estado;

                    if (estadoActual === 'Entregado' || estadoActual === 'Cancelado' || estadoActual === 'Devolución') {
                        botonesAccion = `<span class="text-muted small">Pedido finalizado</span>`;
                    } else {
                        botonesAccion = `
                            <button class="btn-estado confirmar" onclick="cambiarEstado('${pedido._id}', 'Confirmado')">✅ Confirmar</button>
                            <button class="btn-estado preparar" onclick="cambiarEstado('${pedido._id}', 'Preparando')">👨‍🍳 Preparar</button>
                            <button class="btn-estado listoo" onclick="cambiarEstado('${pedido._id}', 'Listo')">🎯 Listo</button>
                            <button class="btn-estado entregar" onclick="cambiarEstado('${pedido._id}', 'Entregado')">📦 Entregar</button>
                            <button class="btn-estado devolucion" onclick="cambiarEstado('${pedido._id}', 'Devolución')">🔄 Devolución</button>
                            <button class="btn-estado cancelar" onclick="cambiarEstado('${pedido._id}', 'Cancelado')">❌ Cancelar</button>
                        `;
                    }

                    html += `
                        <tr>
                            <td><strong>#${index + 1}</strong><br><small class="text-muted">${fechaFormateada}</small></td>
                            <td>
                                <div class="pedido-cliente">${nombreCliente}</div>
                                <div class="pedido-email">${emailCliente}</div>
                            </td>
                            <td class="text-start small">${productosTexto}</td>
                            <td class="fw-bold text-success">$${total.toFixed(2)}</td>
                            <td><span class="badge-origen ${origenBadge}">${origen === 'tienda_online' ? '🛒 Tienda' : '🧑‍💼 Cajero'}</span></td>
                            <td><span class="badge-estado ${estadoClass}">${estadoLabel}</span></td>
                            <td>
                                <div class="d-flex flex-column gap-1">
                                    ${botonesAccion}
                                </div>
                            </td>
                        </tr>
                    `;
                });

                html += `
                            </tbody>
                        </table>
                    </div>
                `;

                contenedor.innerHTML = html;

            } catch (error) {
                console.error('Error al cargar pedidos:', error);
                contenedor.innerHTML = `
                    <div class="text-center py-4 text-danger">
                        <i class="fas fa-exclamation-circle" style="font-size: 2rem;"></i>
                        <p class="mt-2">Error al cargar los pedidos</p>
                    </div>
                `;
            }
        }

        // ==========================================
        // CAMBIAR ESTADO DEL PEDIDO
        // ==========================================
        async function cambiarEstado(pedidoId, nuevoEstado) {
            if (!confirm(`¿Cambiar estado del pedido a "${nuevoEstado}"?`)) return;

            try {
                const res = await fetch(`/api/pedidos/${pedidoId}/estado`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado: nuevoEstado })
                });

                const data = await res.json();

                if (data.success) {
                    alert(`✅ Estado actualizado a "${nuevoEstado}"`);
                    cargarPedidos();
                } else {
                    alert('❌ Error: ' + data.mensaje);
                }
            } catch (error) {
                console.error('Error al cambiar estado:', error);
                alert('❌ Error al conectar con el servidor.');
            }
        }

        // ==========================================
        // CONTROL DE ACCESO
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            const rol = sessionStorage.getItem('rol');
            const idUsuario = sessionStorage.getItem('id_usuario');
            if (!idUsuario || !rol || (rol !== 'cajero' && rol !== 'admin')) {
                alert("Acceso denegado.");
                sessionStorage.clear();
                window.location.href = "sesion.html";
                return;
            }
            cargarCatalogoProductos();
            pintarCarritoVisual();
        });

        // ==========================================
        // CARGAR CATÁLOGO DE PRODUCTOS
        // ==========================================
        async function cargarCatalogoProductos() {
            try {
                const respuesta = await fetch('/api/productos/con-imagenes');
                productosGlobal = await respuesta.json();
                const contenedores = {
                    'Caliente': 'contenedor-calientes',
                    'Fria': 'contenedor-frias',
                    'Fría': 'contenedor-frias',
                    'Snack': 'contenedor-snacks'
                };
                Object.values(contenedores).forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.innerHTML = '';
                });
                productosGlobal.forEach(p => {
                    const tieneStock = p.tamaños.some(t => t.cantidad > 0);
                    if (!tieneStock) return;
                    const idContenedor = contenedores[p.tipo];
                    const div = document.getElementById(idContenedor);
                    if (div) {
                        let tamanosHTML = '';
                        p.tamaños.forEach(t => {
                            if (t.cantidad > 0) {
                                const badgeClase = t.tamaño === 'Chico' ? 'badge-chico' : (t.tamaño === 'Grande' ? 'badge-grande' : 'badge-tamano');
                                tamanosHTML += `
                                    <option value="${t.tamaño}" data-precio="${t.precio}" data-stock="${t.cantidad}" class="badge ${badgeClase}">
                                        ${t.tamaño} - $${t.precio.toFixed(2)} (${t.cantidad} disp.)
                                    </option>`;
                            }
                        });
                        if (tamanosHTML === '') return;

                        let imagenSrc = p.imagen || '/img/productos/default.jpg';
                        if (!p.imagen) {
                            imagenSrc = `https://via.placeholder.com/300x200/7A1FA1/FEFEFF?text=${encodeURIComponent(p.nombre)}`;
                        }

                        div.innerHTML += `
                            <div class="col-md-4 mb-3">
                                <div class="card card-producto shadow-sm h-100 bg-light">
                                    <div class="producto-imagen-wrapper">
                                        <img src="${imagenSrc}" 
                                             class="producto-imagen" 
                                             alt="${p.nombre}" 
                                             onerror="this.src='https://via.placeholder.com/300x200/f0ebe4/b0a090?text=Sin+imagen'">
                                    </div>
                                    <div class="card-body text-center d-flex flex-column justify-content-between">
                                        <div>
                                            <h5 class="fw-bold">${p.nombre}</h5>
                                            <div class="mb-2">
                                                <select class="form-select form-select-sm" id="tamano-${p._id}">
                                                    ${tamanosHTML}
                                                </select>
                                            </div>
                                            <p class="text-muted small">Stock: <span id="stock-${p._id}">${p.tamaños[0].cantidad}</span> pz</p>
                                        </div>
                                        <div>
                                            <div class="d-flex gap-2">
                                                <input type="number" id="cant-${p._id}" class="form-control text-center" value="1" min="1">
                                                <button class="btn btn-principal" onclick="agregarAlCarrito('${p._id}', '${p.nombre}')">➕</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                    }
                });
                document.querySelectorAll('[id^="tamano-"]').forEach(select => {
                    select.addEventListener('change', function() {
                        const id = this.id.replace('tamano-', '');
                        const stockSpan = document.getElementById(`stock-${id}`);
                        const selectedOption = this.options[this.selectedIndex];
                        if (stockSpan && selectedOption) {
                            const stock = selectedOption.getAttribute('data-stock');
                            stockSpan.textContent = stock;
                        }
                    });
                });
            } catch (error) {
                console.error("Error al cargar el catálogo:", error);
            }
        }

        // ==========================================
        // AGREGAR AL CARRITO
        // ==========================================
        function agregarAlCarrito(id, nombre) {
            const inputCant = document.getElementById(`cant-${id}`);
            const selectTamano = document.getElementById(`tamano-${id}`);
            const cant = parseInt(inputCant.value);
            if (isNaN(cant) || cant <= 0) return alert("Cantidad no válida.");
            const tamanoSeleccionado = selectTamano.value;
            const selectedOption = selectTamano.options[selectTamano.selectedIndex];
            const precio = parseFloat(selectedOption.getAttribute('data-precio'));
            const stock = parseInt(selectedOption.getAttribute('data-stock'));
            if (cant > stock) {
                alert(`Stock insuficiente. Solo quedan ${stock} unidades de ${tamanoSeleccionado}.`);
                return;
            }
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const itemIndex = carrito.findIndex(i => i.id_producto === id && i.tamaño === tamanoSeleccionado);
            if (itemIndex !== -1) {
                const nuevaCant = carrito[itemIndex].cantidad + cant;
                if (nuevaCant > stock) {
                    alert(`Stock insuficiente. Solo quedan ${stock} unidades de ${tamanoSeleccionado}.`);
                    return;
                }
                carrito[itemIndex].cantidad = nuevaCant;
            } else {
                carrito.push({
                    id_producto: id,
                    nombre: nombre,
                    tamaño: tamanoSeleccionado,
                    precio: precio,
                    cantidad: cant
                });
            }
            localStorage.setItem('carrito', JSON.stringify(carrito));
            inputCant.value = 1;
            pintarCarritoVisual();
        }

        // ==========================================
        // PINTAR CARRITO
        // ==========================================
        function pintarCarritoVisual() {
            const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const tbody = document.getElementById('tabla-carrito');
            tbody.innerHTML = '';
            let total = 0;
            carrito.forEach((item, index) => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                const badgeClase = item.tamaño === 'Chico' ? 'badge-chico' : (item.tamaño === 'Grande' ? 'badge-grande' : 'badge-tamano');
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${item.nombre}</strong></td>
                        <td><span class="badge ${badgeClase}">${item.tamaño || 'Único'}</span></td>
                        <td>$${item.precio.toFixed(2)}</td>
                        <td>${item.cantidad}</td>
                        <td class="fw-bold">$${subtotal.toFixed(2)}</td>
                        <td><button class="btn btn-sm btn-danger" onclick="eliminarProductoDelCarrito(${index})">🗑️</button></td>
                    </tr>`;
            });
            document.getElementById('txt-total').innerText = `$${total.toFixed(2)}`;
        }

        // ==========================================
        // ELIMINAR PRODUCTO DEL CARRITO
        // ==========================================
        function eliminarProductoDelCarrito(index) {
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            carrito.splice(index, 1);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            pintarCarritoVisual();
        }

        // ==========================================
        // PROCESAR COBRO FINAL
        // ==========================================
        async function procesarCobroFinal(e) {
            const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            if (carrito.length === 0) return alert("Carrito vacío.");
            e.target.disabled = true;
            const totalVenta = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            try {
                const res = await fetch('/api/ventas/guardar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id_usuario: sessionStorage.getItem('id_usuario'),
                        total: totalVenta,
                        productos: carrito.map(i => ({
                            id_producto: i.id_producto,
                            tamaño: i.tamaño || 'Único',
                            cantidad: i.cantidad,
                            precio: i.precio
                        }))
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert("¡Venta registrada!");
                    localStorage.removeItem('carrito');
                    location.reload();
                } else {
                    alert(data.mensaje);
                    e.target.disabled = false;
                }
            } catch (error) {
                console.error("Error al procesar la venta:", error);
                alert("Error de conexión con el servidor.");
                e.target.disabled = false;
            }
        }

        // ==========================================
        // CERRAR SESIÓN
        // ==========================================
        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = "sesion.html";
        }
    </script>
</body>
</html>
